<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MeterDataService - Přehled měření</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YcnS/1TyKZNjfBs23BRp0cIdQQGEwfhHr4g"
          crossorigin="anonymous" />
    <style>
        body { padding-top: 20px; }
        .table-responsive { margin-top: 15px; }
        .pagination-info { line-height: 38px; }
        .loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.7); z-index: 9999;
            display: none; align-items: center; justify-content: center;
        }
        .loading-overlay.active { display: flex; }
    </style>
</head>
<body>
    <!-- Překrytí při načítání -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Načítání...</span>
        </div>
    </div>

    <div class="container-fluid">
        <h2 class="mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor"
                 class="bi bi-lightning-charge me-2" viewBox="0 0 16 16">
                <path d="M11.251.068a.5.5 0 0 1 .227.58L9.677 6.5H13a.5.5 0 0 1 .364.843l-8 8.5a.5.5 0 0 1-.842-.49L6.323 9.5H3a.5.5 0 0 1-.364-.843l8-8.5a.5.5 0 0 1 .615-.09z"/>
            </svg>
            MeterDataService – Přehled měření
        </h2>

        <!-- Filtrační formulář -->
        <div class="card mb-3">
            <div class="card-body">
                <form id="filterForm" class="row g-3 align-items-end">
                    <div class="col-md-3">
                        <label for="filterSerialNumber" class="form-label">Sériové číslo</label>
                        <input type="text" class="form-control" id="filterSerialNumber"
                               placeholder="Hledat dle sériového čísla..." />
                    </div>
                    <div class="col-md-3">
                        <label for="filterDateFrom" class="form-label">Vytvořeno od</label>
                        <input type="date" class="form-control" id="filterDateFrom" />
                    </div>
                    <div class="col-md-3">
                        <label for="filterDateTo" class="form-label">Vytvořeno do</label>
                        <input type="date" class="form-control" id="filterDateTo" />
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn btn-primary me-2">
                            Filtrovat
                        </button>
                        <button type="button" class="btn btn-outline-secondary" id="btnReset">
                            Resetovat
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Informace o stránkování a počet výsledků -->
        <div class="row mb-2">
            <div class="col-md-6">
                <span id="resultInfo" class="text-muted"></span>
            </div>
            <div class="col-md-6 text-end">
                <label class="me-2">Záznamů na stránku:</label>
                <select id="pageSizeSelect" class="form-select d-inline-block" style="width: auto;">
                    <option value="10">10</option>
                    <option value="20" selected>20</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </select>
            </div>
        </div>

        <!-- Tabulka s daty -->
        <div class="table-responsive">
            <table class="table table-striped table-hover table-bordered">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Sériové číslo</th>
                        <th>Timestamp</th>
                        <th>Síť</th>
                        <th>Model</th>
                        <th>1.8.0 (kWh)</th>
                        <th>1.8.1 (kWh)</th>
                        <th>1.8.2 (kWh)</th>
                        <th>2.8.0 (kWh)</th>
                        <th>Vytvořeno</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody">
                    <tr>
                        <td colspan="10" class="text-center text-muted">Načítání dat...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Stránkování -->
        <nav aria-label="Stránkování">
            <ul class="pagination justify-content-center" id="pagination">
            </ul>
        </nav>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>

    <script>
        (function () {
            'use strict';

            // === Stavové proměnné ===
            var currentOffset = 0;
            var currentLimit = 20;
            var totalCount = 0;

            // === DOM prvky ===
            var tableBody = document.getElementById('dataTableBody');
            var pagination = document.getElementById('pagination');
            var resultInfo = document.getElementById('resultInfo');
            var loadingOverlay = document.getElementById('loadingOverlay');
            var filterForm = document.getElementById('filterForm');
            var btnReset = document.getElementById('btnReset');
            var pageSizeSelect = document.getElementById('pageSizeSelect');

            // === Funkce pro načtení dat z API ===
            function loadData() {
                showLoading(true);

                var serialNumber = document.getElementById('filterSerialNumber').value.trim();
                var dateFrom = document.getElementById('filterDateFrom').value;
                var dateTo = document.getElementById('filterDateTo').value;

                // Sestavení URL s parametry
                var params = [];
                params.push('offset=' + currentOffset);
                params.push('limit=' + currentLimit);
                if (serialNumber) params.push('serialNumber=' + encodeURIComponent(serialNumber));
                if (dateFrom) params.push('createdAtFrom=' + encodeURIComponent(dateFrom));
                if (dateTo) params.push('createdAtTo=' + encodeURIComponent(dateTo));

                var url = '/api/data?' + params.join('&');

                // AJAX volání
                var xhr = new XMLHttpRequest();
                xhr.open('GET', url, true);
                xhr.setRequestHeader('Accept', 'application/json');

                xhr.onload = function () {
                    showLoading(false);

                    if (xhr.status === 200) {
                        try {
                            var response = JSON.parse(xhr.responseText);
                            totalCount = response.totalCount || 0;
                            renderTable(response.data || []);
                            renderPagination();
                            updateResultInfo();
                        } catch (e) {
                            showError('Chyba při zpracování odpovědi serveru.');
                        }
                    } else {
                        showError('Chyba serveru (HTTP ' + xhr.status + ').');
                    }
                };

                xhr.onerror = function () {
                    showLoading(false);
                    showError('Nepodařilo se připojit k serveru.');
                };

                xhr.send();
            }

            // === Vykreslení tabulky ===
            function renderTable(data) {
                if (!data || data.length === 0) {
                    tableBody.innerHTML =
                        '<tr><td colspan="10" class="text-center text-muted">' +
                        'Žádná data nenalezena.</td></tr>';
                    return;
                }

                var html = '';
                for (var i = 0; i < data.length; i++) {
                    var row = data[i];
                    html += '<tr>';
                    html += '<td>' + escapeHtml(row.id) + '</td>';
                    html += '<td><strong>' + escapeHtml(row.serialNumber) + '</strong></td>';
                    html += '<td>' + formatDateTime(row.timestamp) + '</td>';
                    html += '<td>' + escapeHtml(row.network) + '</td>';
                    html += '<td>' + escapeHtml(row.model) + '</td>';
                    html += '<td>' + formatNumber(row.data_1_8_0) + '</td>';
                    html += '<td>' + formatNumber(row.data_1_8_1) + '</td>';
                    html += '<td>' + formatNumber(row.data_1_8_2) + '</td>';
                    html += '<td>' + formatNumber(row.data_2_8_0) + '</td>';
                    html += '<td>' + formatDateTime(row.createdAt) + '</td>';
                    html += '</tr>';
                }
                tableBody.innerHTML = html;
            }

            // === Vykreslení stránkování ===
            function renderPagination() {
                var totalPages = Math.ceil(totalCount / currentLimit);
                var currentPage = Math.floor(currentOffset / currentLimit) + 1;

                if (totalPages <= 1) {
                    pagination.innerHTML = '';
                    return;
                }

                var html = '';

                // Tlačítko Předchozí
                html += '<li class="page-item ' + (currentPage <= 1 ? 'disabled' : '') + '">';
                html += '<a class="page-link" href="#" data-page="' + (currentPage - 1) + '">&laquo; Předchozí</a>';
                html += '</li>';

                // Číslované stránky (zobrazíme max 7 stránek kolem aktuální)
                var startPage = Math.max(1, currentPage - 3);
                var endPage = Math.min(totalPages, currentPage + 3);

                if (startPage > 1) {
                    html += '<li class="page-item"><a class="page-link" href="#" data-page="1">1</a></li>';
                    if (startPage > 2) {
                        html += '<li class="page-item disabled"><span class="page-link">...</span></li>';
                    }
                }

                for (var p = startPage; p <= endPage; p++) {
                    html += '<li class="page-item ' + (p === currentPage ? 'active' : '') + '">';
                    html += '<a class="page-link" href="#" data-page="' + p + '">' + p + '</a>';
                    html += '</li>';
                }

                if (endPage < totalPages) {
                    if (endPage < totalPages - 1) {
                        html += '<li class="page-item disabled"><span class="page-link">...</span></li>';
                    }
                    html += '<li class="page-item"><a class="page-link" href="#" data-page="' + totalPages + '">' + totalPages + '</a></li>';
                }

                // Tlačítko Další
                html += '<li class="page-item ' + (currentPage >= totalPages ? 'disabled' : '') + '">';
                html += '<a class="page-link" href="#" data-page="' + (currentPage + 1) + '">&raquo; Další</a>';
                html += '</li>';

                pagination.innerHTML = html;
            }

            // === Aktualizace informací o výsledcích ===
            function updateResultInfo() {
                if (totalCount === 0) {
                    resultInfo.textContent = 'Žádné záznamy';
                    return;
                }
                var from = currentOffset + 1;
                var to = Math.min(currentOffset + currentLimit, totalCount);
                resultInfo.textContent = 'Zobrazeno ' + from + ' – ' + to + ' z ' + totalCount + ' záznamů';
            }

            // === Pomocné funkce ===
            function escapeHtml(value) {
                if (value === null || value === undefined) return '–';
                var str = String(value);
                var div = document.createElement('div');
                div.appendChild(document.createTextNode(str));
                return div.innerHTML;
            }

            function formatNumber(value) {
                if (value === null || value === undefined) return '–';
                return Number(value).toFixed(2);
            }

            function formatDateTime(value) {
                if (!value) return '–';
                try {
                    var d = new Date(value);
                    if (isNaN(d.getTime())) return escapeHtml(value);
                    return d.toLocaleDateString('cs-CZ') + ' ' + d.toLocaleTimeString('cs-CZ');
                } catch (e) {
                    return escapeHtml(value);
                }
            }

            function showLoading(show) {
                if (show) {
                    loadingOverlay.classList.add('active');
                } else {
                    loadingOverlay.classList.remove('active');
                }
            }

            function showError(message) {
                tableBody.innerHTML =
                    '<tr><td colspan="10" class="text-center text-danger">' +
                    escapeHtml(message) + '</td></tr>';
                pagination.innerHTML = '';
                resultInfo.textContent = '';
            }

            // === Obsluha událostí ===

            // Odeslání filtru
            filterForm.addEventListener('submit', function (e) {
                e.preventDefault();
                currentOffset = 0; // Při novém filtru začínáme od začátku
                loadData();
            });

            // Reset filtrů
            btnReset.addEventListener('click', function () {
                document.getElementById('filterSerialNumber').value = '';
                document.getElementById('filterDateFrom').value = '';
                document.getElementById('filterDateTo').value = '';
                currentOffset = 0;
                loadData();
            });

            // Změna počtu záznamů na stránku
            pageSizeSelect.addEventListener('change', function () {
                currentLimit = parseInt(this.value, 10);
                currentOffset = 0;
                loadData();
            });

            // Kliknutí na stránkování (delegace událostí)
            pagination.addEventListener('click', function (e) {
                e.preventDefault();
                var target = e.target.closest('[data-page]');
                if (!target) return;

                var page = parseInt(target.getAttribute('data-page'), 10);
                var totalPages = Math.ceil(totalCount / currentLimit);

                if (page < 1 || page > totalPages) return;

                currentOffset = (page - 1) * currentLimit;
                loadData();

                // Posun nahoru na stránce
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            // === Úvodní načtení dat ===
            loadData();
        })();
    </script>
</body>
</html>
